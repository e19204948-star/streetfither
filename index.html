<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=1.0, user-scalable=no">
       <title>FireChat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00a884;
            --primary-dark: #008f6f;
            --bg-body: #d1d7db;
            --bg-app: #ffffff;
            --bg-chat: #efeae2;
            --bg-header: #f0f2f5;
            --text-main: #111b21;
            --text-secondary: #667781;
            --msg-sent: #dcf8c6;
            --msg-received: #ffffff;
            --online: #1fa33a;
            --offline: #8696a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { 
            background: linear-gradient(180deg, var(--primary) 127px, var(--bg-body) 127px); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }

        .login-screen {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
        }

        .app-container { 
            display: none; width: 95%; max-width: 1400px; height: 95vh; 
            background: var(--bg-app); border-radius: 10px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .sidebar { width: 30%; min-width: 300px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }

        .header { 
            height: 60px; background: var(--bg-header); display: flex; 
            align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 10;
        }

        @media (max-width: 768px) {
            .app-container { width: 100%; height: 100vh; border-radius: 0; }
            .sidebar { width: 100%; display: flex; }
            .chat-area { width: 100%; display: none; }
            .app-container.chat-active .sidebar { display: none; }
            .app-container.chat-active .chat-area { display: flex; }
        }

        .back-btn { display: none; margin-right: 10px; cursor: pointer; }
        @media (max-width: 768px) { .back-btn { display: block; } }

        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .contact-item:hover { background: #f9f9f9; }
        .contact-item.active { background: #ebebeb; }

        /* --- AVATAR & STATUS --- */
        .avatar-wrapper { position: relative; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .status-dot { 
            position: absolute; bottom: 2px; right: 2px; 
            width: 12px; height: 12px; border-radius: 50%; 
            border: 2px solid white; background: var(--offline); 
        }
        .status-dot.online { background: var(--online); }

        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; z-index: 5; }
        .msg-bubble { 
            max-width: 75%; padding: 8px 12px; margin-bottom: 5px; border-radius: 10px; 
            font-size: 14px; position: relative; word-wrap: break-word;
        }
        .msg-sent { background: var(--msg-sent); align-self: flex-end; }
        .msg-received { background: var(--msg-received); align-self: flex-start; }

        .input-area { padding: 10px; background: var(--bg-header); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        .input-area button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h2 style="margin-bottom:15px">FireChat</h2>
        <input type="text" id="username-input" placeholder="Ton prénom..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd">
        <button id="login-btn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold">Entrer</button>
    </div>
</div>

<div class="app-container" id="app-container">
    <div class="sidebar">
        <div class="header">
            <strong id="my-name">Chargement...</strong>
            <button onclick="logout()" style="margin-left:auto; border:none; background:none; color:red; cursor:pointer; font-size:12px">Quitter</button>
        </div>
        <div class="contact-list" id="contact-list"></div>
    </div>

    <div class="chat-area">
        <div class="header">
            <div class="back-btn" onclick="closeChat()">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </div>
            <div id="active-chat-info" style="display:flex; align-items:center; gap:10px">Sélectionne un chat</div>
        </div>
        <div class="messages-container" id="messages-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Message..." disabled>
            <button id="send-btn" disabled>➤</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "846140280738",
        authDomain: "messagerie-cd2ba.firebaseapp.com",
        databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "messagerie-cd2ba",
        storageBucket: "messagerie-cd2ba.appspot.com",
        messagingSenderId: "846140280738",
        appId: "messagerie-cd2ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let currentContactId = null;
    let activeChatRef = null;

    // --- SYSTEME DE PRESENCE ---
    function trackPresence(userId) {
        const userStatusRef = db.ref(`users/${userId}/status`);
        const connectedRef = db.ref('.info/connected');

        connectedRef.on('value', (snap) => {
            if (snap.val() === true) {
                // Si on se déconnecte, Firebase mettra 'offline' tout seul
                userStatusRef.onDisconnect().set('offline');
                // On est actuellement 'online'
                userStatusRef.set('online');
            }
        });
    }

    // --- NOTIFICATIONS ---
    function sendNotification(name, text) {
        if (Notification.permission === "granted" && document.hidden) {
            new Notification(name, { body: text });
        }
    }

    // --- CONNEXION ---
    document.getElementById('login-btn').onclick = () => {
        const name = document.getElementById('username-input').value.trim();
        if (!name) return;

        db.ref('users').orderByChild('name').equalTo(name).once('value', (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                currentUser = data[Object.keys(data)[0]];
                loginSuccess();
            } else {
                const newUserRef = db.ref('users').push();
                currentUser = {
                    id: newUserRef.key,
                    name: name,
                    color: '#' + Math.floor(Math.random()*16777215).toString(16),
                    status: 'online'
                };
                newUserRef.set(currentUser).then(loginSuccess);
            }
        });
    };

    function loginSuccess() {
        localStorage.setItem('chat_user', JSON.stringify(currentUser));
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        document.getElementById('my-name').textContent = currentUser.name;
        
        if ("Notification" in window) Notification.requestPermission();
        
        trackPresence(currentUser.id);
        loadContacts();
    }

    function loadContacts() {
        db.ref('users').on('value', (snap) => {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            snap.forEach((child) => {
                const user = child.val();
                if (user.id === currentUser.id) return;
                
                const isOnline = user.status === 'online';
                const div = document.createElement('div');
                div.className = `contact-item ${currentContactId === user.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="avatar-wrapper">
                        <div class="avatar" style="background:${user.color}">${user.name[0]}</div>
                        <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                    </div>
                    <div style="flex:1">
                        <div style="font-weight:600">${user.name}</div>
                        <div style="font-size:11px; color:var(--text-secondary)">${isOnline ? 'En ligne' : 'Hors ligne'}</div>
                    </div>`;
                div.onclick = () => openChat(user);
                list.appendChild(div);
            });
        });
    }

    function openChat(contact) {
        currentContactId = contact.id;
        document.getElementById('app-container').classList.add('chat-active');
        
        const isOnline = contact.status === 'online';
        document.getElementById('active-chat-info').innerHTML = `
            <div class="avatar" style="background:${contact.color}; width:35px; height:35px">${contact.name[0]}</div>
            <div>
                <div style="font-weight:bold; font-size:14px">${contact.name}</div>
                <div style="font-size:10px">${isOnline ? 'en ligne' : 'hors ligne'}</div>
            </div>`;
        
        document.getElementById('message-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('messages-container').innerHTML = '';

        const chatId = [currentUser.id, currentContactId].sort().join('_');
        if (activeChatRef) activeChatRef.off();
        activeChatRef = db.ref('chats/' + chatId);

        activeChatRef.on('child_added', (snap) => {
            const msg = snap.val();
            const container = document.getElementById('messages-container');
            const isMe = msg.senderId === currentUser.id;
            
            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
            div.textContent = msg.text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            if (!isMe) sendNotification(contact.name, msg.text);
        });
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !currentContactId) return;

        const chatId = [currentUser.id, currentContactId].sort().join('_');
        db.ref('chats/' + chatId).push({
            text: text,
            senderId: currentUser.id,
            timestamp: Date.now()
        });
        input.value = '';
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    function closeChat() {
        document.getElementById('app-container').classList.remove('chat-active');
        currentContactId = null;
    }

    function logout() { 
        if(currentUser) db.ref(`users/${currentUser.id}/status`).set('offline');
        localStorage.clear(); 
        location.reload(); 
    }

    const saved = localStorage.getItem('chat_user');
    if (saved) { currentUser = JSON.parse(saved); loginSuccess(); }
</script>

</body>
</html>

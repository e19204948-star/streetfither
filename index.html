<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FireChat Pro - Moderne</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a884;
            --primary-dark: #008f6f;
            --bg-body: #f0f2f5;
            --bg-app: #ffffff;
            --bg-chat: #efeae2;
            --bg-sidebar: #ffffff;
            --text-main: #111b21;
            --text-secondary: #667781;
            --msg-sent: #dcf8c6;
            --msg-received: #ffffff;
            --accent: #53bdeb;
            --shadow: 0 6px 18px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg-body);
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* Décoration de fond */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            width: 100%;
            height: 130px;
            background-color: var(--primary);
            z-index: -1;
        }

        /* --- Écran de Connexion --- */
        .login-screen { 
            position: fixed; 
            inset: 0; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            padding: 20px;
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .login-box h2 { color: var(--primary); margin-bottom: 25px; font-weight: 700; font-size: 28px; }
        .login-box input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            outline: none; 
            transition: 0.3s;
        }
        .login-box input:focus { border-color: var(--primary); }
        .login-box button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.3s;
        }
        .login-box button:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* --- Layout App --- */
        .app-container { 
            display: none; 
            width: 95%; 
            max-width: 1500px; 
            height: 94vh; 
            background: var(--bg-app); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Sidebar */
        .sidebar { 
            width: 30%; 
            min-width: 320px; 
            background: var(--bg-sidebar); 
            display: flex; 
            flex-direction: column;
            border-right: 1px solid #e9edef;
        }
        .header { 
            height: 65px; 
            background: #f0f2f5; 
            display: flex; 
            align-items: center; 
            padding: 0 16px; 
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        /* Liste Contacts */
        .contact-list { flex: 1; overflow-y: auto; background: white; }
        .contact-item { 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            transition: 0.2s;
            border-bottom: 1px solid #f5f6f6;
        }
        .contact-item:hover { background: #f5f6f6; }
        .contact-item.active { background: #eff2f5; }
        
        .avatar { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Zone de Chat */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-chat); 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Pattern WhatsApp */
            background-blend-mode: overlay;
        }

        .messages-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 7% 10px 7%; 
            display: flex; 
            flex-direction: column; 
            scroll-behavior: smooth;
        }

        /* Bulles de Message */
        .msg-bubble { 
            max-width: 65%; 
            padding: 8px 12px; 
            margin-bottom: 4px; 
            font-size: 14.5px; 
            position: relative; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg-sent { 
            background: var(--msg-sent); 
            align-self: flex-end; 
            border-radius: 12px 0 12px 12px; 
        }
        .msg-received { 
            background: var(--msg-received); 
            align-self: flex-start; 
            border-radius: 0 12px 12px 12px; 
        }

        .sender-name { font-size: 12px; font-weight: 700; color: var(--primary-dark); margin-bottom: 3px; display: block; }

        /* Input Zone */
        .input-area { 
            padding: 10px 16px; 
            background: #f0f2f5; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }
        .input-area input[type="text"] { 
            flex: 1; 
            padding: 12px 18px; 
            border: none; 
            border-radius: 24px; 
            outline: none; 
            font-size: 15px;
            background: white;
        }

        .btn-action { 
            background: none; 
            border: none; 
            color: #54656f; 
            cursor: pointer; 
            font-size: 22px; 
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action:hover:not(:disabled) { color: var(--primary); transform: scale(1.1); }
        .btn-send { color: var(--primary); font-size: 26px; }

        .file-preview { 
            max-width: 300px; 
            border-radius: 8px; 
            margin: 4px 0; 
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container { width: 100%; height: 100vh; border-radius: 0; }
            .sidebar { width: 100%; }
            .chat-active .sidebar { display: none; }
            .chat-active .chat-area { display: flex; position: fixed; inset: 0; }
        }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h2>FireChat</h2>
        <input type="text" id="username-input" placeholder="Quel est ton nom ?">
        <button id="login-btn">Rejoindre la discussion</button>
    </div>
</div>

<div class="app-container" id="app-container">
    <div class="sidebar">
        <div class="header">
            <div class="avatar" style="background:var(--primary)" id="user-initial">?</div>
            <strong id="my-name">Chargement...</strong>
            <button onclick="createNewGroup()" style="margin-left:auto; background: #e9edef; border:none; padding:8px 12px; border-radius:20px; cursor:pointer; font-size:12px; font-weight:600">+ Groupe</button>
            <button onclick="logout()" style="border:none; color:#ea4335; cursor:pointer; background:none; font-size:18px" title="Quitter">✕</button>
        </div>
        <div class="contact-list" id="contact-list"></div>
    </div>

    <div class="chat-area">
        <div class="header">
            <button onclick="closeChat()" id="back-btn" style="background:none; border:none; cursor:pointer; font-size: 24px; color: #54656f;">←</button>
            <div id="active-chat-info" style="display:flex; flex-direction:column;">
                <span style="font-weight:600">Sélectionne une discussion</span>
            </div>
        </div>
        
        <div class="messages-container" id="messages-container">
            </div>

        <div class="input-area">
            <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(this.files[0])">
            <button class="btn-action" id="file-btn" onclick="document.getElementById('file-input').click()" disabled>📎</button>
            
            <input type="text" id="message-input" placeholder="Tapez un message..." disabled>
            
            <button class="btn-action btn-send" id="send-btn" disabled>➤</button>
        </div>
    </div>
</div>

<script>
    // --- TON JAVASCRIPT EXISTANT ICI ---
    // (Conserve toute ta logique Firebase sans changement)
    
    // Petite addition pour l'initiale de l'avatar utilisateur
    const originalLoginSuccess = loginSuccess;
    loginSuccess = function() {
        originalLoginSuccess();
        document.getElementById('user-initial').textContent = currentUser.name[0].toUpperCase();
    };
</script>

</body>
</html>

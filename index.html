<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>messagerie personnel</title>
    <style>
        /* --- RÉINITIALISATION ET BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        body { background-color: #d1d7db; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* --- ÉCRAN DE CONNEXION --- */
        .login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #00a884; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px;
        }
        .login-box h2 { margin-bottom: 10px; color: #41525d; }
        .login-box p { margin-bottom: 20px; font-size: 14px; color: #667781; }
        .login-box input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none;
        }
        .login-box button {
            width: 100%; padding: 15px; background: #00a884; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        /* --- APPLICATION PRINCIPALE --- */
        .app-container { display: none; width: 95%; max-width: 1400px; height: 95vh; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sidebar { width: 30%; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .sidebar-header { background: #f0f2f5; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; }
        .contact-list { overflow-y: auto; flex: 1; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; align-items: center; }
        .contact-item:hover { background: #f5f6f6; }
        .contact-item.active { background: #ebebeb; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; text-transform: uppercase; }

        .chat-area { width: 70%; display: flex; flex-direction: column; background: #efeae2; position: relative; }
        .chat-header { background: #f0f2f5; height: 60px; display: flex; align-items: center; padding: 0 15px; font-weight: 600; border-bottom: 1px solid #ddd; z-index: 1; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; z-index: 1; }

        .msg-bubble { max-width: 65%; padding: 8px 10px; margin-bottom: 12px; border-radius: 7.5px; font-size: 14px; position: relative; word-wrap: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .msg-sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .msg-received { background: #ffffff; align-self: flex-start; border-top-left-radius: 0; }

        .delete-btn { display: none; position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; }
        .msg-bubble:hover .delete-btn { display: block; }

        .input-area { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; z-index: 1; }
        .input-area input { flex: 1; padding: 15px 20px; border: none; border-radius: 8px; outline: none; }
        .input-area button { margin-left: 15px; padding: 12px 20px; border: none; background: #00a884; color: white; border-radius: 8px; cursor: pointer; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h2>Bienvenue</h2>
        <p>Entrez votre prénom pour vous connecter</p>
        <input type="text" id="username-input" placeholder="Ex: Jean, Marie...">
        <button id="login-btn">Accéder à la messagerie</button>
    </div>
</div>

<div class="app-container" id="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <span id="my-profile-name" style="font-weight: bold; font-size: 14px;">Chargement...</span>
            <button onclick="logout()" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size:12px;">Déconnexion</button>
        </div>
        <div class="contact-list" id="contact-list"></div>
    </div>
    <div class="chat-area">
        <div class="chat-header" id="chat-header">Sélectionnez une discussion</div>
        <div class="messages-container" id="messages-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Tapez un message" disabled>
           <button id="send-btn" disabled>
               <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
               </svg>
           </button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "846140280738", 
        authDomain: "messagerie-cd2ba.firebaseapp.com",
        databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "messagerie-cd2ba",
        storageBucket: "messagerie-cd2ba.appspot.com",
        messagingSenderId: "846140280738",
        appId: "messagerie-cd2ba" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let currentContactId = null;
    let activeChatListener = null;

    const loginScreen = document.getElementById('login-screen');
    const appContainer = document.getElementById('app-container');
    const contactListEl = document.getElementById('contact-list');
    const messagesContainer = document.getElementById('messages-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatHeaderEl = document.getElementById('chat-header');

    // Vérification auto au chargement
    function checkLogin() {
        const saved = localStorage.getItem('mon_app_utilisateur');
        if (saved) {
            currentUser = JSON.parse(saved);
            showApp();
        }
    }

    // --- LOGIQUE DE CONNEXION AMÉLIORÉE ---
    document.getElementById('login-btn').onclick = () => {
        const name = document.getElementById('username-input').value.trim();
        if (!name) return alert("Veuillez entrer un nom");

        // On cherche si l'utilisateur existe déjà par son nom
        db.ref('users').orderByChild('name').equalTo(name).once('value', (snapshot) => {
            if (snapshot.exists()) {
                // L'utilisateur existe : on récupère ses données
                const data = snapshot.val();
                const userId = Object.keys(data)[0];
                currentUser = data[userId];
                loginSuccess();
            } else {
                // L'utilisateur n'existe pas : on le crée
                const newUserRef = db.ref('users').push();
                currentUser = {
                    id: newUserRef.key,
                    name: name,
                    color: ['#00a884', '#3498db', '#9b59b6', '#e67e22', '#e74c3c'][Math.floor(Math.random() * 5)]
                };
                newUserRef.set(currentUser).then(loginSuccess);
            }
        });
    };

    function loginSuccess() {
        localStorage.setItem('mon_app_utilisateur', JSON.stringify(currentUser));
        showApp();
    }

    function logout() { localStorage.removeItem('mon_app_utilisateur'); location.reload(); }

    function showApp() {
        loginScreen.style.display = 'none';
        appContainer.style.display = 'flex';
        document.getElementById('my-profile-name').textContent = "Moi: " + currentUser.name;
        loadContacts();
    }

    function loadContacts() {
        db.ref('users').on('value', (snapshot) => {
            contactListEl.innerHTML = '';
            const users = snapshot.val();
            if (!users) return;
            for (let id in users) {
                const contact = users[id];
                if (contact.id === currentUser.id) continue;
                const div = document.createElement('div');
                div.className = `contact-item ${currentContactId === contact.id ? 'active' : ''}`;
                div.innerHTML = `<div class="avatar" style="background:${contact.color}">${contact.name[0]}</div><span>${contact.name}</span>`;
                div.onclick = () => openChat(contact, div);
                contactListEl.appendChild(div);
            }
        });
    }

    function openChat(contact, el) {
        currentContactId = contact.id;
        chatHeaderEl.innerHTML = `<div class="avatar" style="background:${contact.color}; width:30px; height:30px; font-size:12px; margin-right:10px;">${contact.name[0]}</div> ${contact.name}`;
        document.querySelectorAll('.contact-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        messageInput.disabled = false; sendBtn.disabled = false;
        messagesContainer.innerHTML = '';
        listenToMessages();
    }

    function listenToMessages() {
        const chatId = [currentUser.id, currentContactId].sort().join('_');
        if (activeChatListener) db.ref('chats/' + activeChatListener).off();
        activeChatListener = chatId;

        db.ref('chats/' + chatId).on('child_added', (snap) => {
            const m = snap.val();
            const isMe = m.senderId === currentUser.id;
            const b = document.createElement('div');
            b.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
            b.setAttribute('data-id', snap.key);
            b.textContent = m.text;
            
            if (isMe) {
                const d = document.createElement('button');
                d.className = 'delete-btn'; d.innerHTML = '×';
                d.onclick = () => { if(confirm("Supprimer ?")) db.ref('chats/'+chatId+'/'+snap.key).remove(); };
                b.appendChild(d);
            }
            messagesContainer.appendChild(b);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        db.ref('chats/' + chatId).on('child_removed', (snap) => {
            const el = document.querySelector(`[data-id="${snap.key}"]`);
            if (el) el.remove();
        });
    }

    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !currentContactId) return;
        db.ref('chats/' + activeChatListener).push({
            text: text,
            senderId: currentUser.id,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        messageInput.value = '';
    }

    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    checkLogin();
</script>
</body>
</html>

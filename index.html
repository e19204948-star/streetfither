<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FireChat - Groupes, Fichiers & Suppression</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a884;
            --primary-dark: #008f6f;
            --bg-body: #d1d7db;
            --bg-app: #ffffff;
            --bg-chat: #efeae2;
            --bg-header: #f0f2f5;
            --text-main: #111b21;
            --text-secondary: #667781;
            --msg-sent: #dcf8c6;
            --msg-received: #ffffff;
            --online: #1fa33a;
            --offline: #8696a0;
            --group-color: #53bdeb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(180deg, var(--primary) 127px, var(--bg-body) 127px); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

        .app-container { display: none; width: 95%; max-width: 1400px; height: 95vh; background: var(--bg-app); border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .sidebar { width: 30%; min-width: 300px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }
        .header { height: 60px; background: var(--bg-header); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 10; gap: 10px; }

        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .contact-item:hover { background: #f9f9f9; }
        .contact-item.active { background: #ebebeb; }
        .contact-item.is-group .avatar { border-radius: 10px; background: var(--group-color) !important; }

        .avatar { width: 45px; height: 45px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; text-transform: uppercase; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        
        .msg-bubble { 
            max-width: 75%; padding: 8px 12px; margin-bottom: 5px; border-radius: 10px; 
            font-size: 14px; position: relative; word-wrap: break-word; 
            cursor: pointer; transition: opacity 0.2s;
        }
        .msg-bubble:active { opacity: 0.7; }
        .msg-sent { background: var(--msg-sent); align-self: flex-end; }
        .msg-received { background: var(--msg-received); align-self: flex-start; }
        .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 2px; display: block; color: var(--primary-dark); }

        .input-area { padding: 10px; background: var(--bg-header); display: flex; gap: 10px; align-items: center; }
        .input-area input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; height: 40px; }
        .btn-action { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .btn-file { background: transparent; color: var(--text-secondary); font-size: 24px; }

        .file-preview { max-width: 250px; border-radius: 8px; margin-top: 5px; display: block; }
        .file-link { color: #027eb5; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 5px; }

        @media (max-width: 768px) {
            .app-container { width: 100%; height: 100vh; border-radius: 0; }
            .sidebar { width: 100%; display: flex; }
            .chat-area { display: none; width: 100%; }
            .app-container.chat-active .sidebar { display: none; }
            .app-container.chat-active .chat-area { display: flex; position: fixed; inset: 0; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h2>FireChat</h2>
        <input type="text" id="username-input" placeholder="Ton prénom..." style="width:100%; padding:10px; margin-top:10px;">
        <button id="login-btn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px">Entrer</button>
    </div>
</div>

<div class="app-container" id="app-container">
    <div class="sidebar">
        <div class="header">
            <strong id="my-name">...</strong>
            <button onclick="createNewGroup()" style="background:var(--primary); color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; font-size:11px">+ Groupe</button>
            <button onclick="logout()" style="margin-left:auto; border:none; color:red; cursor:pointer; background:none; font-size:12px">Quitter</button>
        </div>
        <div class="contact-list" id="contact-list"></div>
    </div>

    <div class="chat-area">
        <div class="header">
            <button onclick="closeChat()" style="background:none; border:none; cursor:pointer; font-size: 20px;">←</button>
            <div id="active-chat-info" style="display:flex; align-items:center; gap:10px">Sélectionne un chat</div>
        </div>
        <div class="messages-container" id="messages-container"></div>
        <div class="input-area">
            <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(this.files[0])">
            <button class="btn-action btn-file" id="file-btn" onclick="document.getElementById('file-input').click()" disabled>📎</button>
            
            <input type="text" id="message-input" placeholder="Message..." disabled>
            <button class="btn-action" id="send-btn" disabled>➤</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "846140280738",
        authDomain: "messagerie-cd2ba.firebaseapp.com",
        databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "messagerie-cd2ba",
        storageBucket: "messagerie-cd2ba.appspot.com",
        messagingSenderId: "846140280738",
        appId: "messagerie-cd2ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentUser = null;
    let currentChatId = null;
    let isGroupChat = false;
    let activeChatRef = null;

    // --- CONNEXION ---
    document.getElementById('login-btn').onclick = () => {
        const name = document.getElementById('username-input').value.trim();
        if (!name) return;
        db.ref('users').orderByChild('name').equalTo(name).once('value', (snap) => {
            if (snap.exists()) {
                currentUser = Object.values(snap.val())[0];
            } else {
                const newUserRef = db.ref('users').push();
                currentUser = { id: newUserRef.key, name: name, color: '#'+Math.floor(Math.random()*16777215).toString(16), status: 'online' };
                newUserRef.set(currentUser);
            }
            loginSuccess();
        });
    };

    function loginSuccess() {
        localStorage.setItem('chat_user', JSON.stringify(currentUser));
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        document.getElementById('my-name').textContent = currentUser.name;
        db.ref(`users/${currentUser.id}/status`).set('online');
        loadSidebar();
    }

    function createNewGroup() {
        const groupName = prompt("Nom du groupe :");
        if (!groupName) return;
        const ref = db.ref('groups').push();
        ref.set({ id: 'group_' + ref.key, name: groupName, isGroup: true });
    }

    function loadSidebar() {
        db.ref().on('value', (snapshot) => {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            const users = snapshot.child('users').val() || {};
            const groups = snapshot.child('groups').val() || {};

            Object.values(groups).forEach(g => renderSidebarItem(g, true));
            Object.values(users).forEach(u => { if(u.id !== currentUser.id) renderSidebarItem(u, false) });
        });
    }

    function renderSidebarItem(item, isGroup) {
        const list = document.getElementById('contact-list');
        const div = document.createElement('div');
        div.className = `contact-item ${isGroup?'is-group':''} ${currentChatId===item.id?'active':''}`;
        div.innerHTML = `<div class="avatar" style="background:${item.color||'#53bdeb'}">${item.name[0]}</div>
                         <div><strong>${item.name}</strong><br><small>${isGroup?'Groupe':(item.status||'offline')}</small></div>`;
        div.onclick = () => openChat(item);
        list.appendChild(div);
    }

    // --- CHAT ET ENVOI ---
    function openChat(target) {
        currentChatId = target.id;
        isGroupChat = !!target.isGroup;
        document.getElementById('app-container').classList.add('chat-active');
        document.getElementById('active-chat-info').innerHTML = `<strong>${target.name}</strong>`;
        document.getElementById('message-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('file-btn').disabled = false;
        
        const container = document.getElementById('messages-container');
        container.innerHTML = '';

        if (activeChatRef) activeChatRef.off();
        const path = isGroupChat ? `group_messages/${target.id}` : `chats/${[currentUser.id, target.id].sort().join('_')}`;
        activeChatRef = db.ref(path);

        activeChatRef.on('value', (snap) => {
            container.innerHTML = '';
            snap.forEach((child) => {
                displayMessage(child.val(), child.key);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    // Gestion de l'envoi de fichier
    async function handleFileUpload(file) {
        if (!file || !activeChatRef) return;
        
        const sendBtn = document.getElementById('send-btn');
        const msgInput = document.getElementById('message-input');
        
        // Indicateur visuel de chargement
        msgInput.placeholder = "Téléchargement en cours...";
        msgInput.disabled = true;
        sendBtn.disabled = true;

        try {
            const fileRef = storage.ref().child(`uploads/${Date.now()}_${file.name}`);
            const snapshot = await fileRef.put(file);
            const downloadURL = await snapshot.ref.getDownloadURL();

            activeChatRef.push({
                text: file.name,
                fileUrl: downloadURL,
                fileType: file.type,
                senderId: currentUser.id,
                senderName: currentUser.name,
                timestamp: Date.now()
            });
        } catch (error) {
            console.error(error);
            alert("Erreur lors de l'envoi du fichier.");
        } finally {
            msgInput.placeholder = "Message...";
            msgInput.disabled = false;
            sendBtn.disabled = false;
            document.getElementById('file-input').value = "";
        }
    }

    function displayMessage(msg, msgId) {
        const container = document.getElementById('messages-container');
        const isMe = msg.senderId === currentUser.id;
        
        const div = document.createElement('div');
        div.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
        
        const sender = (isGroupChat && !isMe) ? `<span class="sender-name">${msg.senderName}</span>` : '';
        
        let content = msg.text;

        // Si c'est un fichier
        if (msg.fileUrl) {
            if (msg.fileType && msg.fileType.startsWith('image/')) {
                content = `<a href="${msg.fileUrl}" target="_blank">
                             <img src="${msg.fileUrl}" class="file-preview">
                           </a>`;
            } else {
                content = `<a href="${msg.fileUrl}" target="_blank" class="file-link">
                             📄 ${msg.text}
                           </a>`;
            }
        }

        div.innerHTML = `${sender}${content}`;

        if (isMe) {
            div.title = "Cliquer pour supprimer";
            div.onclick = () => {
                if (confirm("Supprimer ce message pour tout le monde ?")) {
                    activeChatRef.child(msgId).remove();
                }
            };
        }

        container.appendChild(div);
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;
        activeChatRef.push({
            text: text,
            senderId: currentUser.id,
            senderName: currentUser.name,
            timestamp: Date.now()
        });
        input.value = '';
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    function closeChat() { document.getElementById('app-container').classList.remove('chat-active'); }
    function logout() { localStorage.clear(); location.reload(); }

    const saved = localStorage.getItem('chat_user');
    if (saved) { currentUser = JSON.parse(saved); loginSuccess(); }
</script>

</body>
</html>

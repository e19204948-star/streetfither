<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Chat | All-in-One</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --text: #ffffff;
            --msg-in: rgba(255, 255, 255, 0.1);
            --sidebar-bg: rgba(10, 10, 10, 0.8);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --glass: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
            --accent: #7000ff;
            --text: #1a1a1a;
            --msg-in: #e4e6eb;
            --sidebar-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* --- ÉCRAN D'AUTHENTIFICATION --- */
        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .glow-text {
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--accent);
            letter-spacing: 8px;
            margin-bottom: 30px;
            font-weight: 800;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* --- APP PRINCIPALE --- */
        .main-app {
            display: none;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .received { background: var(--msg-in); align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3); }

        .input-bar {
            padding: 20px;
            background: var(--sidebar-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            cursor: pointer;
            font-size: 1.4rem;
            z-index: 1000;
            background: var(--glass);
            padding: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .sidebar span, .sidebar h2, .user-profile span { display: none; }
            .main-app { flex-direction: column; }
            .sidebar { width: 100%; height: 60px; flex-direction: row; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" id="theme-btn">
        <i class="fas fa-moon"></i>
    </div>

    <div id="auth-screen" class="glass-container">
        <h1 class="glow-text">AETHER</h1>
        <div id="login-form">
            <h2 id="auth-title" style="margin-bottom: 15px;">Connexion</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button id="auth-btn">Accéder au réseau</button>
            <p id="toggle-auth" style="cursor:pointer; margin-top:20px; font-size: 0.9rem; opacity: 0.7;">Pas de compte ? Créer un profil</p>
        </div>
    </div>

    <div id="app-screen" class="main-app" style="display: none;">
        <aside class="sidebar">
            <h2 style="margin-bottom: 20px;">Contacts</h2>
            <div id="user-info" style="margin-bottom: 20px; font-weight: bold; color: var(--accent);"></div>
            <div class="contact-list">
                <div style="padding: 10px; background: var(--glass); border-radius: 10px;">
                    <i class="fas fa-circle" style="color: #00ff00; font-size: 0.7rem;"></i> Canal Principal
                </div>
            </div>
            <button id="btn-logout" style="background: transparent; border: 1px solid red; color: red; margin-top: auto;">Quitter</button>
        </aside>

        <main class="chat-area">
            <div class="messages" id="message-display"></div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Entrez votre message...">
                <button id="btn-send" style="width: 60px; margin: 0;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION (Utilise tes IDs fournis)
        const firebaseConfig = {
            apiKey: "846140280738", // <--- REMPLACER PAR TA CLE API
            authDomain: "messagerie-cd2ba.firebaseapp.com",
            databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "messagerie-cd2ba",
            storageBucket: "messagerie-cd2ba.appspot.com",
            messagingSenderId: "846140280738",
            appId: "1:846140280738:web:votre_id"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- GESTION DES THEMES ---
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.onclick = () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        // --- AUTHENTIFICATION ---
        const authBtn = document.getElementById('auth-btn');
        const toggleAuth = document.getElementById('toggle-auth');
        let isLoggingIn = true;

        toggleAuth.onclick = () => {
            isLoggingIn = !isLoggingIn;
            document.getElementById('auth-title').innerText = isLoggingIn ? "Connexion" : "Inscription";
            authBtn.innerText = isLoggingIn ? "Accéder au réseau" : "Créer le profil";
            toggleAuth.innerText = isLoggingIn ? "Pas de compte ? Créer un profil" : "Déjà membre ? Se connecter";
        };

        authBtn.onclick = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(isLoggingIn) {
                signInWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('user-info').innerText = user.email.split('@')[0].toUpperCase();
                listenMessages();
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        // --- MESSAGES ---
        const sendBtn = document.getElementById('btn-send');
        const msgInput = document.getElementById('msg-input');
        const display = document.getElementById('message-display');

        const sendAction = () => {
            if (msgInput.value.trim() !== "") {
                push(ref(db, 'messages'), {
                    text: msgInput.value,
                    user: auth.currentUser.email,
                    time: serverTimestamp()
                });
                msgInput.value = "";
            }
        };

        sendBtn.onclick = sendAction;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendAction(); };

        function listenMessages() {
            display.innerHTML = ""; 
            onChildAdded(ref(db, 'messages'), (snap) => {
                const data = snap.val();
                const isMe = data.user === auth.currentUser.email;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'sent' : 'received'}`;
                div.innerHTML = `<small style="font-size:0.7rem; opacity:0.6">${data.user.split('@')[0]}</small><br>${data.text}`;
                display.appendChild(div);
                display.scrollTop = display.scrollHeight;
            });
        }
    </script>
</body>
</html>
